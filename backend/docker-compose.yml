services:
  database:
    image: postgis/postgis:13-master
    volumes:
      - ./data/database:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "directus"
      POSTGRES_PASSWORD: "directus"
      POSTGRES_DB: "directus"
    healthcheck:
      test: ["CMD", "pg_isready", "--host=localhost", "--username=directus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s

  cache:
    image: redis:6
    healthcheck:
      test: ["CMD-SHELL", "[ $$(redis-cli ping) = 'PONG' ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s

  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      SECRET: "artistplattform-secret-key-2024"

      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: "directus"

      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"

      ADMIN_EMAIL: "admin@artistplattform.local"
      ADMIN_PASSWORD: "Admin1234!"

      PUBLIC_URL: "http://localhost:8055"

  spotify-auth:
    build:
      context: ./spotify-auth
    ports:
      - "5050:5050"
    env_file:
      - ./.env
    environment:
      PORT: "5050"
      FRONTEND_URL: "http://127.0.0.1:3000"
      BACKEND_URL: "http://127.0.0.1:5050"
      SPOTIFY_SCOPES: "user-read-email user-read-private user-top-read user-library-read user-follow-read playlist-read-private"
      JWT_SECRET: "artistplattform-jwt-secret-2024"

  frontend:
    build:
      context: ../frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_SPOTIFY_BACKEND_URL: "http://127.0.0.1:5050"
    depends_on:
      - spotify-auth
    stdin_open: true
